name: SampleApp
options:
  bundleIdPrefix: com.limrun.sample
  deploymentTarget:
    iOS: "16.0"
targets:
  SampleApp:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CODE_SIGNING_ALLOWED: NO
        SWIFT_VERSION: "5.9"
